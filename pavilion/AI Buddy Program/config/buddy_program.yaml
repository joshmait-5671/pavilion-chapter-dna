program:
  id: ai_buddy_program
  name: "Pavilion AI Buddy Program"
  version: "2.0"
  owner_email: "josh.mait@joinpavilion.com"

matching:
  # Non-negotiable criteria (must match)
  require_same_function: true
  require_same_revenue_stage: true

  # Tiered fallback timing (business days)
  tier_schedule:
    tier_1: 0   # Day 1: Perfect match (all criteria)
    tier_2: 1   # Day 2: Relax location to timezone
    tier_3: 2   # Day 3: Relax AI level to adjacent
    tier_4: 4   # Day 5: Function + revenue only

  # Scoring weights
  scoring:
    function:           40   # Same function (required)
    revenue_stage:      30   # Same revenue stage (required)
    same_city:          20   # Same city
    same_timezone:      10   # Same timezone (if not same city)
    engagement_overlap: 15   # Any shared engagement preference
    same_ai_level:      15   # Exact AI level match
    adjacent_ai_level:   5   # One level apart
    member_mix:          5   # Member + non-member pair

  functions:
    - Sales
    - Marketing
    - Customer Success
    - RevOps
    - Finance
    - HR & People
    - Operations
    - Product
    - Founder / CEO
    - Other

  revenue_stages:
    - label: "Less than $10M"
      rank: 1
    - label: "$10M – $25M"
      rank: 2
    - label: "$25M – $50M"
      rank: 3
    - label: "$50M+"
      rank: 4

  ai_levels:
    - label: "Getting started"
      rank: 1
    - label: "Using it regularly"
      rank: 2
    - label: "Building with it"
      rank: 3

  engagement_styles:
    - "Quick async check-ins (Slack, text)"
    - "Bi-weekly video call"
    - "Weekly video call"
    - "Share resources and articles"
    - "Accountability partner"

  timezones:
    - "Eastern (ET)"
    - "Central (CT)"
    - "Mountain (MT)"
    - "Pacific (PT)"
    - "Other US"
    - "Europe"
    - "Asia-Pacific"
    - "Other"

  # Timezone groupings for fallback matching
  timezone_groups:
    US_East: ["Eastern (ET)", "Central (CT)"]
    US_West: ["Mountain (MT)", "Pacific (PT)"]
    International: ["Europe", "Asia-Pacific", "Other"]

lifecycle:
  # Check-in schedule (days after match)
  check_ins:
    - day: 7
      type: connection_check
      message: "Did you connect with your buddy?"
      options: ["Yes", "Not yet", "Need help"]
    - day: 28
      type: pulse_check
      message: "How's it going with your buddy?"
      options: ["1", "2", "3", "4", "5"]
    - day: 56
      type: decision_point
      message: "Want to keep your buddy, get a new one, or add a second?"
      options: ["Keep my buddy", "New match please", "Add a second buddy"]

  # After keeping, shift to quarterly pulse
  quarterly_pulse:
    enabled: true
    interval_days: 90

intro:
  sender_name: "Josh Mait"
  sender_title: "Head of Marketing, Pavilion"
  sender_email: "josh.mait@joinpavilion.com"
  model: "claude-opus-4-6"
  program_description: |
    The Pavilion AI Buddy Program pairs operators who are figuring out AI in
    their day-to-day work. You've been matched based on your function, company
    stage, timezone, and how you like to work. This isn't mentorship — it's a
    peer who gets what you're dealing with. Some pairs talk weekly. Some ping
    each other once a month. Both are fine. No stupid questions. No pressure.

tracking:
  spreadsheet_id: "1nXqkzcW2HMA04jS4zjfB2Y7DT0RTjUdtVZY4XM1WFoY"
  waitlist_tab: "Waitlist"
  requests_tab: "Requests"
  matches_tab: "Matches"
  lifecycle_tab: "Lifecycle"
  approval_mode: "manual"  # "manual" = Josh reviews, "auto" = send immediately

launch:
  target_signups: 100
  status: "waitlist"  # "waitlist" | "live"
