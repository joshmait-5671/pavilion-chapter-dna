<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #180A5C;
    font-family: 'Poppins', sans-serif;
    color: #fff;
  }

  .frame {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
  }

  /* ── Pavilion mark (corner, persistent) ── */
  .pavilion-mark {
    position: absolute;
    top: 40px;
    right: 40px;
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    animation-delay: 0.5s;
  }

  /* ── BEAT 1: Chapter name (0-5s) ── */
  .beat-1 {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slamIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               fadeOut 0.3s ease forwards 4.5s;
    animation-delay: 0.2s, 4.5s;
  }
  .chapter-name {
    font-size: 180px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -4px;
    line-height: 0.9;
    text-align: center;
  }

  /* ── BEAT 2: Stat hook (5-12s) ── */
  .beat-2 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slamIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               fadeOut 0.3s ease forwards 11.5s;
    animation-delay: 5.2s, 11.5s;
  }
  .stat-number {
    font-size: 200px;
    font-weight: 900;
    color: #DF285B;
    line-height: 1;
  }
  .stat-descriptor {
    font-size: 36px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  /* ── BEAT 3: Quotes (12-22s) — 3 quotes, ~3.3s each ── */
  .quote-card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
    opacity: 0;
  }
  .quote-text {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 30px;
  }
  .quote-text::before { content: '\201C'; color: #DF285B; }
  .quote-text::after { content: '\201D'; color: #DF285B; }
  .quote-attribution {
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
  }

  /* Quote 1: 12-15.3s */
  .quote-1 {
    animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               fadeOut 0.2s ease forwards 15.1s;
    animation-delay: 12.2s, 15.1s;
  }
  /* Quote 2: 15.3-18.6s */
  .quote-2 {
    animation: slideInLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               fadeOut 0.2s ease forwards 18.4s;
    animation-delay: 15.5s, 18.4s;
  }
  /* Quote 3: 18.6-22s */
  .quote-3 {
    animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               fadeOut 0.2s ease forwards 21.7s;
    animation-delay: 18.8s, 21.7s;
  }

  /* ── BEAT 4: Community stat (22-26s) ── */
  .beat-4 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slamIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               fadeOut 0.3s ease forwards 25.5s;
    animation-delay: 22.2s, 25.5s;
  }
  .beat-4 .stat-number {
    font-size: 160px;
  }

  /* ── BEAT 5: CTA (26-30s) ── */
  .beat-5 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    opacity: 0;
    animation: slamIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 26.2s;
  }
  .cta-line {
    font-size: 64px;
    font-weight: 900;
    text-align: center;
    line-height: 1.1;
    padding: 0 60px;
  }
  .cta-url {
    font-size: 28px;
    font-weight: 400;
    color: #DF285B;
    letter-spacing: 2px;
  }
  .cta-logo {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ── Keyframes ── */
  @keyframes slamIn {
    0% { opacity: 0; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes fadeOut {
    to { opacity: 0; }
  }
  @keyframes slideInRight {
    0% { opacity: 0; transform: translateX(100px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    0% { opacity: 0; transform: translateX(-100px); }
    100% { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
<div class="frame">

  <div class="pavilion-mark">PAVILION</div>

  <!-- BEAT 1: Chapter name -->
  <div class="beat-1">
    <div class="chapter-name">{{CHAPTER_NAME}}</div>
  </div>

  <!-- BEAT 2: Stat hook -->
  <div class="beat-2">
    <div class="stat-number">{{STAT_NUMBER}}</div>
    <div class="stat-descriptor">{{STAT_DESCRIPTOR}}</div>
  </div>

  <!-- BEAT 3: Quotes -->
  <div class="quote-card quote-1">
    <div class="quote-text">{{QUOTE_1}}</div>
    <div class="quote-attribution">{{QUOTE_1_NAME}}, {{QUOTE_1_TITLE}}</div>
  </div>
  <div class="quote-card quote-2">
    <div class="quote-text">{{QUOTE_2}}</div>
    <div class="quote-attribution">{{QUOTE_2_NAME}}, {{QUOTE_2_TITLE}}</div>
  </div>
  <div class="quote-card quote-3">
    <div class="quote-text">{{QUOTE_3}}</div>
    <div class="quote-attribution">{{QUOTE_3_NAME}}, {{QUOTE_3_TITLE}}</div>
  </div>

  <!-- BEAT 4: Community stat -->
  <div class="beat-4">
    <div class="stat-number">{{BEAT4_NUMBER}}</div>
    <div class="stat-descriptor">{{BEAT4_DESCRIPTOR}}</div>
  </div>

  <!-- BEAT 5: CTA -->
  <div class="beat-5">
    <div class="cta-line">{{CTA_LINE}}</div>
    <div class="cta-url">joinpavilion.com</div>
    <div class="cta-logo">▲ Pavilion</div>
  </div>

</div>
</body>
</html>
