<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: 'Poppins', system-ui, sans-serif;
  }

  .frame {
    width: 512px;
    height: 512px;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    /* Meshon: flat, bold, warm — not gradient-y */
    background: #1B3A5C;
  }

  /* Solid color block shapes — Meshon uses flat fills, not gradients */
  .block {
    position: absolute;
    z-index: 1;
  }

  /* Big bold background blocks */
  .block-1 {
    width: 280px; height: 280px;
    background: #E8583E;
    border-radius: 50%;
    top: -60px; right: -40px;
  }
  .block-2 {
    width: 200px; height: 200px;
    background: #F2C94C;
    border-radius: 50%;
    bottom: -20px; left: -30px;
  }
  .block-3 {
    width: 160px; height: 300px;
    background: #2D9B83;
    bottom: 0; left: 60px;
    transform: rotate(-15deg);
    border-radius: 80px;
  }
  .block-4 {
    width: 120px; height: 120px;
    background: #E87AB0;
    border-radius: 50%;
    top: 50px; left: 30px;
  }

  /* Hand-drawn style doodles — thick strokes, imperfect shapes */
  .doodle {
    position: absolute;
    z-index: 2;
  }

  /* Thick outlined circle */
  .doodle-1 {
    width: 70px; height: 70px;
    border: 6px solid #fff;
    border-radius: 50%;
    top: 20px; left: 60px;
    opacity: 0.7;
  }

  /* Fat X mark */
  .doodle-2 {
    top: 40px; right: 70px;
    width: 40px; height: 40px;
    opacity: 0.6;
  }
  .doodle-2::before, .doodle-2::after {
    content: '';
    position: absolute;
    width: 40px; height: 6px;
    background: #fff;
    top: 50%; left: 0;
    border-radius: 3px;
  }
  .doodle-2::before { transform: rotate(45deg); }
  .doodle-2::after { transform: rotate(-45deg); }

  /* Thick squiggly lines via borders */
  .doodle-3 {
    width: 50px; height: 25px;
    border-bottom: 6px solid #F2C94C;
    border-radius: 0 0 50% 50%;
    top: 100px; right: 30px;
    opacity: 0.6;
  }

  /* Small filled dot cluster */
  .dot { position: absolute; border-radius: 50%; z-index: 2; }
  .dot-1 { width: 14px; height: 14px; background: #fff; top: 130px; left: 40px; opacity: 0.5; }
  .dot-2 { width: 10px; height: 10px; background: #F2C94C; top: 148px; left: 52px; opacity: 0.6; }
  .dot-3 { width: 8px; height: 8px; background: #E8583E; top: 125px; left: 58px; opacity: 0.5; }
  .dot-4 { width: 12px; height: 12px; background: #fff; bottom: 100px; right: 40px; opacity: 0.4; }
  .dot-5 { width: 16px; height: 16px; background: #E87AB0; top: 15px; left: 170px; opacity: 0.5; }

  /* Thick outlined star — SVG inline */
  .star {
    position: absolute;
    z-index: 2;
    top: 60px; left: 140px;
    opacity: 0.5;
  }

  /* Thick half-circle arc */
  .arc {
    position: absolute;
    z-index: 2;
    width: 60px; height: 30px;
    border-top: 6px solid #fff;
    border-radius: 60px 60px 0 0;
    bottom: 70px; left: 30px;
    opacity: 0.4;
    transform: rotate(-20deg);
  }

  /* Zigzag line */
  .zigzag {
    position: absolute;
    z-index: 2;
    bottom: 50px; right: 50px;
    opacity: 0.4;
  }

  /* Photo cutout */
  .photo {
    position: absolute;
    z-index: 3;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 420px;
    height: auto;
    margin-bottom: -20px;
  }

  /* Bold outlined ring — Meshon loves thick borders */
  .ring {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 5px solid rgba(255,255,255,0.25);
    z-index: 4;
  }

  /* Label bar */
  .label {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    background: #1B3A5C;
    border: 3px solid #fff;
    padding: 5px 18px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
  }

  .instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="frame">
  <!-- Flat color blocks -->
  <div class="block block-1"></div>
  <div class="block block-2"></div>
  <div class="block block-3"></div>
  <div class="block block-4"></div>

  <!-- Doodle elements -->
  <div class="doodle doodle-1"></div>
  <div class="doodle doodle-2"></div>
  <div class="doodle doodle-3"></div>
  <div class="arc"></div>

  <!-- Dot cluster -->
  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>
  <div class="dot dot-4"></div>
  <div class="dot dot-5"></div>

  <!-- Star -->
  <svg class="star" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7L12 16.4 5.7 21l2.3-7L2 9.4h7.6z"/>
  </svg>

  <!-- Zigzag -->
  <svg class="zigzag" width="60" height="20" viewBox="0 0 60 20">
    <polyline points="0,15 10,5 20,15 30,5 40,15 50,5 60,15" fill="none" stroke="#F2C94C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- Your cutout -->
  <img class="photo" src="josh-cutout.png" alt="Josh">

  <!-- Ring -->
  <div class="ring"></div>

  <!-- Label -->
  <div class="label">Pavilion</div>
</div>

<div class="instructions">Right-click the circle → Save Image As... (or screenshot it)</div>

</body>
</html>
